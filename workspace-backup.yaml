defaults:
  compression: gz
  retention_count: 30
  enabled: true

jobs:
  # Main workspace backup
  - name: workspace
    enabled: true
    source_dir: /home/anupam/Desktop/workspace
    target_dir: /home/anupam/Desktop/backup_data
    compression: gz
    retention_count: 30
    excludes:
      - "*.tmp"
      - ".git/*"
      - "backup-tool/.git/*"
      - "emotional_architecture/.git/*"
      - "feed_analyser/.git/*"
      - "hermes/.git/*"
      - "llm/.git/*"
      - "pi-mono/.git/*"
      - "skills/.git/*"
      - "survival-infrastructure/.git/*"
      - "agent-browser/.git/*"
      - "node_modules/*"
      - "feed_analyser/frontend/node_modules/*"
      - "__pycache__/*"
      - ".pytest_cache/*"
      - "feed_analyser/.pytest_cache/*"
      - "llm/.pytest_cache/*"
      - "survival-infrastructure/.pytest_cache/*"
      - "*.pyc"
      - ".venv/*"
      - "venv/*"
      - "feed_analyser/.venv/*"
      - "feed_analyser/backend/venv/*"
      - "hermes/venv/*"
      - "llm/.venv/*"
      - "survival-infrastructure/.venv/*"
      - "feed_analyser/frontend/dist/*"
      - "llm/tmp/*"
      - "hermes/.hermes-data/.cache/*"
      - "hermes/.hermes-data/.npm/*"
      - "hermes/.hermes-data/logs/*"
      - "hermes/.hermes-data/audio_cache/*"
      - "hermes/.hermes-data/image_cache/*"
      - "hermes/.hermes-data/cache/*"
      - "hermes/.hermes-data/ollama_cloud_models_cache.json"
      - "hermes/.hermes-data/models_dev_cache.json"
      - "hermes/.hermes-data/.update_check"
      - "*.log"
      - "llm/gemma/*.gguf"
      - "survival-infrastructure/llm/gemma/*.gguf"
      - ".DS_Store"
      - "Thumbs.db"
